appId: com.mousecursor.ai
productName: Mouse Cursor AI
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSScreenCaptureUsageDescription: Mouse Cursor AI requires screen capture to understand your screen and provide guidance.
    - NSAppleEventsUsageDescription: Mouse Cursor AI uses Apple Events for accessibility features.
  notarize: false
  target:
    - dmg
    - zip
dmg:
  artifactName: ${name}-${version}.${ext}
win:
  executableName: mouse-cursor-ai
  target:
    - nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
linux:
  target:
    - AppImage
    - deb
  maintainer: mousecursor.ai
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
